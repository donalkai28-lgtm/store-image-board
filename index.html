<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>素材看板 MVP</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <section class="filters" aria-label="筛选区">
        <div class="filter-group">
          <div class="segmented-control" role="tablist" aria-label="内容类型">
            <button id="storeImagesFilter" class="is-active" type="button">商店图</button>
            <button id="iconFilter" type="button">icon</button>
          </div>
        </div>
        <div class="filter-group category-filter">
          <span class="filter-label">品类</span>
          <button id="categoryFilterBtn" class="category-filter-btn" type="button">全部品类</button>
          <div id="categoryFilterMenu" class="category-filter-menu"></div>
        </div>
      </section>
      <section class="table-panel" aria-live="polite">
        <table class="asset-table">
          <thead>
            <tr>
              <th>序号</th>
              <th>产品名</th>
              <th>采集时间</th>
              <th>品类</th>
              <th>商店图</th>
              <th>备注</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="assetTableBody">
            <tr>
              <td class="empty-cell" colspan="7">正在读取素材数据...</td>
            </tr>
          </tbody>
        </table>
      </section>
      <section class="pagination" aria-label="分页">
        <button id="prevPageBtn" type="button">上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button id="nextPageBtn" type="button">下一页</button>
      </section>
      <section id="previewDock" class="preview-dock" hidden>
        <img src="" alt="">
      </section>
    </main>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <datalist id="categoryOptions"></datalist>
    <script src="board.js"></script>
    <script src="preview.js"></script>
  </body>
</html>
